general:
  debug: false
  instance_name: SearXNG
  privacypolicy_url: false
  donation_url: false
  contact_url: false
  enable_metrics: true
  open_metrics: ''
brand:
  docs_url: https://docs.searxng.org/
  public_instances: https://searx.space
  wiki_url: https://github.com/searxng/searxng/wiki
  issue_url: https://github.com/searxng/searxng/issues
search:
  safe_search: 0
  autocomplete: ''
  autocomplete_min: 4
  favicon_resolver: ''
  default_lang: auto
  ban_time_on_fail: 10
  max_ban_time_on_fail: 60
  suspended_times:
    SearxEngineAccessDenied: 180
    SearxEngineCaptcha: 3600
    SearxEngineTooManyRequests: 180
    cf_SearxEngineCaptcha: 1296000
    cf_SearxEngineAccessDenied: 86400
    recaptcha_SearxEngineCaptcha: 604800
  formats:
  - html
  - json
server:
  port: 8888
  bind_address: 127.0.0.1
  base_url: false
  limiter: false
  public_instance: false
  secret_key: changeme
  image_proxy: false
  http_protocol_version: '1.0'
  method: POST
  default_http_headers:
    X-Content-Type-Options: nosniff
    X-Download-Options: noopen
    X-Robots-Tag: noindex, nofollow
    Referrer-Policy: no-referrer
valkey:
  url: false
ui:
  static_path: ''
  templates_path: ''
  query_in_title: false
  default_theme: simple
  center_alignment: false
  default_locale: ''
  theme_args:
    simple_style: auto
  search_on_category_select: true
  hotkeys: default
  url_formatting: pretty
preferences:
  lock: []
outgoing:
  request_timeout: 5.0
  useragent_suffix: ''
  pool_connections: 20
  pool_maxsize: 10
  enable_http2: true
plugins:
  searx.plugins.calculator.SXNGPlugin:
    active: true
  searx.plugins.infinite_scroll.SXNGPlugin:
    active: false
  searx.plugins.hash_plugin.SXNGPlugin:
    active: true
  searx.plugins.self_info.SXNGPlugin:
    active: true
  searx.plugins.unit_converter.SXNGPlugin:
    active: true
  searx.plugins.ahmia_filter.SXNGPlugin:
    active: true
  searx.plugins.hostnames.SXNGPlugin:
    active: true
  searx.plugins.time_zone.SXNGPlugin:
    active: true
  searx.plugins.oa_doi_rewrite.SXNGPlugin:
    active: false
  searx.plugins.tor_check.SXNGPlugin:
    active: false
  searx.plugins.tracker_url_remover.SXNGPlugin:
    active: true
categories_as_tabs:
  general: null
  images: null
  videos: null
  news: null
  map: null
  music: null
  it: null
  science: null
  files: null
  social media: null
engines:
- name: bing
  engine: bing
  shortcut: bi
  disabled: false
  timeout: 2.0
  weight: 3
- name: yandex
  engine: yandex
  categories: general
  search_type: web
  shortcut: yd
  disabled: false
  timeout: 2.0
  weight: 2
- name: dogpile
  engine: dogpile
  shortcut: dog
  dogpile_categ: search
  categories: general
  disabled: false
  timeout: 3.0
  weight: 2
- name: gmx
  engine: gmx
  shortcut: gmx
  disabled: false
  timeout: 2.0
  weight: 1
- name: vuhuv
  engine: vuhuv
  categories: general
  vuhuv_category: general
  shortcut: vu
  disabled: false
  timeout: 5.0
  weight: 2
- name: privacywall
  engine: privacywall
  categories: general
  privacywall_category: general
  paging: false
  shortcut: pw
  disabled: false
  timeout: 5.0
  weight: 2
doi_resolvers:
  oadoi.org: https://oadoi.org/
  doi.org: https://doi.org/
  sci-hub.se: https://sci-hub.se/
  sci-hub.st: https://sci-hub.st/
  sci-hub.ru: https://sci-hub.ru/
default_doi_resolver: oadoi.org
