name: deploy

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: npx prisma generate
      - run: pnpm lint
      - run: pnpm test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      AUTH_GITHUB_ID: ${{ secrets.AUTH_GITHUB_ID }}
      AUTH_GITHUB_SECRET: ${{ secrets.AUTH_GITHUB_SECRET }}
      AUTH_GOOGLE_ID: ${{ secrets.AUTH_GOOGLE_ID }}
      AUTH_GOOGLE_SECRET: ${{ secrets.AUTH_GOOGLE_SECRET }}
      NEXT_PUBLIC_APP_URL: "https://vexa.itsabhin.in"
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: GROQ_API_KEY, AUTH_SECRET, AUTH_GITHUB_ID, AUTH_GITHUB_SECRET, AUTH_GOOGLE_ID, AUTH_GOOGLE_SECRET, NEXT_PUBLIC_APP_URL
          script: |
            set -e

            # install Docker if missing
            command -v docker >/dev/null 2>&1 || {
              curl -fsSL https://get.docker.com | sh
              sudo usermod -aG docker ubuntu
            }

            # clone or pull repo
            if [ -d /opt/vexa ]; then
              cd /opt/vexa
              git pull origin main
            else
              sudo git clone https://github.com/abhinaverma97/vexa-search.git /opt/vexa
              sudo chown "$(whoami):$(whoami)" -R /opt/vexa
              cd /opt/vexa
            fi

            # write .env
            cat > .env << ENVEOF
            GROQ_API_KEY=$GROQ_API_KEY
            AUTH_SECRET=$AUTH_SECRET
            AUTH_GITHUB_ID=$AUTH_GITHUB_ID
            AUTH_GITHUB_SECRET=$AUTH_GITHUB_SECRET
            AUTH_GOOGLE_ID=$AUTH_GOOGLE_ID
            AUTH_GOOGLE_SECRET=$AUTH_GOOGLE_SECRET
            NEXT_PUBLIC_APP_URL=$NEXT_PUBLIC_APP_URL
            ENVEOF

            # install Caddy if missing
            command -v caddy >/dev/null 2>&1 || {
              sudo apt-get update -qq
              sudo apt-get install -y -qq debian-keyring debian-archive-keyring apt-transport-https
              curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/gpg.key' | sudo gpg --dearmor -o /usr/share/keyrings/caddy-stable-archive-keyring.gpg
              curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/debian.deb.txt' | sudo tee /etc/apt/sources.list.d/caddy-stable.list
              sudo apt-get update -qq
              sudo apt-get install -y -qq caddy
            }

            # add Caddy entry if not present
            if ! grep -q "vexa.itsabhin.in" /etc/caddy/Caddyfile 2>/dev/null; then
              sudo tee -a /etc/caddy/Caddyfile > /dev/null << 'CADDYEOF'

            vexa.itsabhin.in {
                reverse_proxy localhost:3000
            }
            CADDYEOF
            fi

            # ensure Caddy is running
            sudo systemctl reload caddy 2>/dev/null || sudo systemctl enable --now caddy

            # pull and rebuild
            sudo docker compose down
            sudo docker compose up -d --build
